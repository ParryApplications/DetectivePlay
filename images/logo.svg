<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gradient for the magnifying glass -->
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7B733;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for the detective hat -->
    <linearGradient id="hatGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3142;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1F2E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1A1F2E" stroke="#4F5D75" stroke-width="2"/>
  
  <!-- Detective Hat -->
  <g filter="url(#shadow)">
    <!-- Hat brim -->
    <ellipse cx="100" cy="75" rx="55" ry="12" fill="url(#hatGradient)"/>
    <ellipse cx="100" cy="75" rx="55" ry="8" fill="#2D3142"/>
    
    <!-- Hat crown -->
    <path d="M 60 75 Q 60 45, 100 40 Q 140 45, 140 75 Z" fill="url(#hatGradient)"/>
    <path d="M 65 75 Q 65 50, 100 45 Q 135 50, 135 75 Z" fill="#2D3142"/>
    
    <!-- Hat band -->
    <ellipse cx="100" cy="75" rx="40" ry="5" fill="#D4A574"/>
  </g>
  
  <!-- Magnifying Glass -->
  <g filter="url(#shadow)">
    <!-- Handle -->
    <rect x="125" y="115" width="8" height="50" rx="4" fill="url(#glassGradient)" transform="rotate(45 129 140)"/>
    
    <!-- Glass rim -->
    <circle cx="100" cy="115" r="32" fill="none" stroke="url(#glassGradient)" stroke-width="6"/>
    
    <!-- Glass lens -->
    <circle cx="100" cy="115" r="28" fill="rgba(244, 241, 222, 0.2)" stroke="none"/>
    
    <!-- Glass reflection -->
    <ellipse cx="90" cy="105" rx="12" ry="18" fill="rgba(255, 255, 255, 0.4)" transform="rotate(-30 90 105)"/>
    <ellipse cx="108" cy="120" rx="6" ry="9" fill="rgba(255, 255, 255, 0.3)" transform="rotate(-30 108 120)"/>
    
    <!-- Fingerprint inside magnifying glass -->
    <g opacity="0.6">
      <path d="M 95 105 Q 95 100, 100 100 Q 105 100, 105 105" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 93 108 Q 93 100, 100 98 Q 107 100, 107 108" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 91 112 Q 91 100, 100 96 Q 109 100, 109 112" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 89 116 Q 89 100, 100 94 Q 111 100, 111 116" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 92 120 Q 92 105, 100 100 Q 108 105, 108 120" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Decorative elements - corner accents -->
  <path d="M 20 20 L 30 20 M 20 20 L 20 30" stroke="#D4A574" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 180 20 L 170 20 M 180 20 L 180 30" stroke="#D4A574" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 20 180 L 30 180 M 20 180 L 20 170" stroke="#D4A574" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 180 180 L 170 180 M 180 180 L 180 170" stroke="#D4A574" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
