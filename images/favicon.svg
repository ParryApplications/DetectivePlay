<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7B733;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3142;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1F2E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="16" cy="16" r="15" fill="#1A1F2E" stroke="#4F5D75" stroke-width="1"/>
  
  <!-- Detective Hat -->
  <ellipse cx="16" cy="12" rx="9" ry="2" fill="url(#hatGrad)"/>
  <path d="M 10 12 Q 10 7, 16 6.5 Q 22 7, 22 12 Z" fill="url(#hatGrad)"/>
  <ellipse cx="16" cy="12" rx="6.5" ry="0.8" fill="#D4A574"/>
  
  <!-- Magnifying Glass -->
  <circle cx="16" cy="18.5" r="5" fill="none" stroke="url(#glassGrad)" stroke-width="1.2"/>
  <circle cx="16" cy="18.5" r="4.3" fill="rgba(244, 241, 222, 0.15)"/>
  <rect x="19.5" y="21.5" width="1.5" height="6" rx="0.7" fill="url(#glassGrad)" transform="rotate(45 20.25 24.5)"/>
  
  <!-- Fingerprint detail -->
  <g opacity="0.5">
    <path d="M 15 17 Q 15 16, 16 16 Q 17 16, 17 17" fill="none" stroke="#D4A574" stroke-width="0.4"/>
    <path d="M 14.5 18 Q 14.5 16, 16 15.5 Q 17.5 16, 17.5 18" fill="none" stroke="#D4A574" stroke-width="0.4"/>
    <path d="M 14 19.5 Q 14 16, 16 15 Q 18 16, 18 19.5" fill="none" stroke="#D4A574" stroke-width="0.4"/>
  </g>
</svg>
